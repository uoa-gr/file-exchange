name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @spourgiti/desktop rebuild-native
      - run: pnpm build:renderer
      - run: pnpm build:desktop
      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable mac code-signing auto-discovery; we ship unsigned for now.
          # When real certs land, add CSC_LINK / CSC_KEY_PASSWORD secrets and
          # remove (or override) this line. Same idea on Windows side via
          # WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm exec electron-builder --publish always
