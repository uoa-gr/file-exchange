name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Vite base path. The repo is uoa-gr/file-exchange, so GitHub Pages
      # serves at /file-exchange/. Override via custom domain by setting
      # PAGES_BASE_URL=/ in repo Variables.
      PAGES_BASE_URL: /file-exchange/
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @liaskos/file-exchange build
        env:
          PAGES_BASE_URL: ${{ env.PAGES_BASE_URL }}
      - name: Add SPA fallback + .nojekyll
        run: |
          cp apps/file-exchange/dist/index.html apps/file-exchange/dist/404.html
          touch apps/file-exchange/dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/file-exchange/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
